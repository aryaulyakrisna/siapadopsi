version: '3.8'

services:
  siapadopsi:
    build:
      context: ./fe
      dockerfile: Dockerfile
    container_name: siapadopsi
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.siapadopsi.rule=Host(`siapadopsi.web.id`) || Host(`www.siapadopsi.web.id`)"
      - "traefik.http.routers.siapadopsi.entrypoints=websecure"
      - "traefik.http.routers.siapadopsi.tls.certresolver=myresolver"
      - "traefik.http.services.siapadopsi.loadbalancer.server.port=4002"
    networks:
      - traefik-net

networks:
  traefik-net:
    external: true